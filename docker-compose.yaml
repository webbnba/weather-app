version: '3.0'

networks:
  weather:
    driver: bridge

volumes:
  db-data:
    driver: local

services:
  backend:
    build:
      dockerfile: core.Dockerfile
    ports:
      - "8086:8086"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - HOST=postgres:5432
    networks:
      - weather
    depends_on:
      - postgres

  postgres:
    image: 'postgres:15.1-alpine'
    ports:
      - "5437:5432"
    env_file:
      - .env
    networks:
      - weather
    volumes:
      - db-data:/var/lib/postgresql/data